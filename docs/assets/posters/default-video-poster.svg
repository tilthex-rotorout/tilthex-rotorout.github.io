<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Default video poster</title>
  <desc id="desc">Default preview image shown before a video starts playing.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1240" cy="180" r="180" fill="rgba(255,255,255,0.08)" />
  <circle cx="220" cy="760" r="220" fill="rgba(255,255,255,0.07)" />
  <rect x="160" y="140" width="1280" height="620" rx="32" fill="rgba(15,23,42,0.28)" stroke="rgba(255,255,255,0.24)" stroke-width="4" />
  <polygon points="700,360 700,540 870,450" fill="#f8fafc" />
  <text x="800" y="245" fill="#e2e8f0" font-size="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" letter-spacing="6">VIDEO PREVIEW</text>
  <text x="800" y="660" fill="#dbeafe" font-size="28" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Replace this poster with a frame image for each clip if needed</text>
</svg>
